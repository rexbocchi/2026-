<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>面试题库刷题</title>
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>面试题库刷题</h1>
      <p id="subtitle">重庆市律师协会申请律师执业人员面试考核题库</p>
    </div>
    <button id="themeBtn" class="icon-btn" title="切换深色模式">🌙</button>
  </header>

  <main class="container">
    <section class="hero-card">
      <div class="stats-grid">
        <div><b id="totalCount">-</b><span>总题数</span></div>
        <div><b id="doneCount">0</b><span>已作答</span></div>
        <div><b id="accuracy">0%</b><span>正确率</span></div>
        <div><b id="wrongCount">0</b><span>错题</span></div>
      </div>
    </section>

    <nav class="tabs" aria-label="模式切换">
      <button class="tab active" data-mode="practice">刷题</button>
      <button class="tab" data-mode="recite">背诵</button>
      <button class="tab" data-mode="wrong">错题</button>
      <button class="tab" data-mode="favorite">收藏</button>
    </nav>

    <section class="toolbar">
      <select id="typeFilter" aria-label="题型筛选">
        <option value="all">全部题型</option>
        <option value="single">单选题</option>
        <option value="multiple">多选题</option>
        <option value="judge">判断题</option>
        <option value="short">简答题</option>
        <option value="case">案例分析题</option>
      </select>
      <select id="orderFilter" aria-label="顺序选择">
        <option value="order">按题库顺序</option>
        <option value="random">随机顺序</option>
      </select>
      <input id="searchInput" type="search" placeholder="搜索题干/答案" />
      <button id="exportBtn" class="tool-btn">导出进度</button>
      <label class="tool-btn import-label" for="importFile">导入进度</label>
      <input id="importFile" type="file" accept="application/json,.json" hidden />
      <button id="resetBtn" class="tool-btn danger-lite">清空进度</button>
    </section>

    <section class="progress-wrap">
      <div class="progress-line"><span id="progressBar"></span></div>
      <div class="progress-text" id="progressText">加载中...</div>
    </section>

    <section id="questionCard" class="question-card"></section>
  </main>

  <footer class="bottom-actions">
    <button id="prevBtn">上一题</button>
    <button id="favBtn">☆ 收藏</button>
    <button id="nextBtn" class="primary">下一题</button>
  </footer>

  <script src="app.js"></script>
</body>
</html>
